name: Publish Package to npm

on:
    push:
        tags:
            - "v**"

permissions:
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup node
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - uses: pnpm/action-setup@v4
              with:
                  version: 11.3.0
                  run_install: true

            - run: pnpm run build

            - name: Determine npm dist-tag
              id: dist_tag
              run: |
                  if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-(.+)$ ]]; then
                      tag="${BASH_REMATCH[1]%%.*}"
                      echo "tag=${tag}" >> "$GITHUB_OUTPUT"
                  else
                      echo "tag=latest" >> "$GITHUB_OUTPUT"
                  fi

            - run: pnpm recursive publish --access public --no-git-checks --provenance --tag ${{ steps.dist_tag.outputs.tag }}
